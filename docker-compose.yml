version: "3.8"

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: traffic_db
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
      POSTGRES_DB: traffic
    ports:
      - "5432:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:alpine
    container_name: traffic_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  backend:
    build: 
      context: ./backend
    container_name: traffic_backend
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgres://root:password@postgres:5432/traffic
      - REDIS_URL=redis://redis:6379
      - ML_SERVICE_URL=http://ml_service:8001
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  ml_service:
    build: 
      context: ./ml_service
    container_name: traffic_ml_service
    ports:
      - "8001:8001"
    restart: always

  frontend:
    build: 
      context: ./frontend
    container_name: traffic_frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:5000
      - VITE_WS_URL=http://localhost:5000
    depends_on:
      - backend
    restart: always
