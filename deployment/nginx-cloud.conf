# NGINX Configuration template for Cloud Providers (e.g. EC2 / Droplets)
# Terminates SSL and successfully filters traffic toward respective active Docker containers

server {
    listen 80;
    server_name bengalurusmarttrafficnavigator.com www.bengalurusmarttrafficnavigator.com;
    # Auto-redirect HTTP to SSL/TLS mapped channels
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name bengalurusmarttrafficnavigator.com www.bengalurusmarttrafficnavigator.com;

    # Specify standard LetsEncrypt SSL injection points
    ssl_certificate /etc/letsencrypt/live/bengalurusmarttrafficnavigator.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bengalurusmarttrafficnavigator.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://127.0.0.1:3000;  # Maps securely back to container traffic_frontend
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # API and Websocket Proxy Pass mappings hooking into the Backend Fleet
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /socket.io/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
